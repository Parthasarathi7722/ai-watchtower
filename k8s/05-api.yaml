apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: ai-watchtower
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      serviceAccountName: watchtower-sa   # needs Bedrock + CloudWatch IAM via IRSA
      containers:
        - name: api
          image: <YOUR_ECR_REPO>/watchtower-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: watchtower-config
            - secretRef:
                name: watchtower-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: api-svc
  namespace: ai-watchtower
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hpa
  namespace: ai-watchtower
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
