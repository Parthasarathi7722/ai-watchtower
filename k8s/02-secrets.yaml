# Store actual secrets in AWS Secrets Manager and sync via External Secrets Operator.
# This file shows the structure — do NOT commit real values.
#
# Recommended: Use AWS Secrets Manager + External Secrets Operator for EKS
# https://external-secrets.io/latest/provider/aws-secrets-manager/
#
# Example ExternalSecret (requires ESO installed):
#
# apiVersion: external-secrets.io/v1beta1
# kind: ExternalSecret
# metadata:
#   name: watchtower-secrets
#   namespace: ai-watchtower
# spec:
#   refreshInterval: 1h
#   secretStoreRef:
#     name: aws-secrets-manager
#     kind: ClusterSecretStore
#   target:
#     name: watchtower-secrets
#   data:
#     - secretKey: SECRET_KEY
#       remoteRef:
#         key: ai-watchtower/prod
#         property: secret_key
#     - secretKey: POSTGRES_PASSWORD
#       remoteRef:
#         key: ai-watchtower/prod
#         property: postgres_password
#     - secretKey: AWS_ACCESS_KEY_ID
#       remoteRef:
#         key: ai-watchtower/prod
#         property: aws_access_key_id
#     - secretKey: AWS_SECRET_ACCESS_KEY
#       remoteRef:
#         key: ai-watchtower/prod
#         property: aws_secret_access_key
#     - secretKey: SLACK_WEBHOOK_URL
#       remoteRef:
#         key: ai-watchtower/prod
#         property: slack_webhook_url
#
# For local EKS testing only (base64-encode real values):
apiVersion: v1
kind: Secret
metadata:
  name: watchtower-secrets
  namespace: ai-watchtower
type: Opaque
stringData:
  SECRET_KEY: "change-me"
  POSTGRES_PASSWORD: "change-me"
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  SLACK_WEBHOOK_URL: ""
