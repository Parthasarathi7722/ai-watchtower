# In production, use AWS RDS PostgreSQL instead of this StatefulSet.
# This is provided for completeness / non-RDS environments.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: ai-watchtower
spec:
  serviceName: postgres-svc
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: watchtower
            - name: POSTGRES_USER
              value: watchtower
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: watchtower-secrets
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp3
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: ai-watchtower
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
