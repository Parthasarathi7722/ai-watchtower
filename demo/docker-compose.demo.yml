version: "3.9"
# ─────────────────────────────────────────────────────────────────────────────
#  AI Watchtower — Hackathon Demo Override
#
#  Usage (append to base compose):
#    docker compose -f docker-compose.yml -f demo/docker-compose.demo.yml up --build
#
#  What this adds:
#    • bedrock-agent       → Real AWS Bedrock agent with Guardrails   :4010
#    • vulnerable-agent    → Bedrock agent with NO guardrails          :4011
#    • event-simulator     → One-shot event burst on startup
#
#  Requires (set in .env or shell):
#    AWS_ACCESS_KEY_ID
#    AWS_SECRET_ACCESS_KEY
#    AWS_REGION          (default: us-east-1)
#    BEDROCK_MODEL_ID    (default: anthropic.claude-3-haiku-20240307-v1:0)
#    BEDROCK_GUARDRAIL_ID          (optional — Bedrock Guardrail for safe agent)
#    BEDROCK_GUARDRAIL_VERSION     (optional — default DRAFT)
#    WATCHTOWER_SAFE_AGENT_ID      (set after first seed run)
#    WATCHTOWER_VULN_AGENT_ID      (set after first seed run)
#
#  Switch to full Promptfoo scan (real LLM probes):
#    Set MOCK_SCAN=false in environment before starting
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Override API to enable MOCK_SCAN=false for full Promptfoo ───────────────
  api:
    environment:
      MOCK_SCAN: ${MOCK_SCAN:-true}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}

  worker:
    environment:
      MOCK_SCAN: ${MOCK_SCAN:-true}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}

  scanner:
    environment:
      MOCK_SCAN: ${MOCK_SCAN:-true}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      BEDROCK_MODEL_ID: ${BEDROCK_MODEL_ID:-anthropic.claude-3-haiku-20240307-v1:0}

  # ── Real Bedrock Agent — SAFE (Guardrails ON) ────────────────────────────────
  bedrock-agent:
    build:
      context: ./demo/bedrock-agent
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4010:4010"
    environment:
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      BEDROCK_MODEL_ID: ${BEDROCK_MODEL_ID:-anthropic.claude-3-haiku-20240307-v1:0}
      BEDROCK_GUARDRAIL_ID: ${BEDROCK_GUARDRAIL_ID:-}
      BEDROCK_GUARDRAIL_VERSION: ${BEDROCK_GUARDRAIL_VERSION:-DRAFT}
      AGENT_NAME: lytx-customer-support
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4010/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Real Bedrock Agent — VULNERABLE (No Guardrails) ─────────────────────────
  vulnerable-agent:
    build:
      context: ./demo/vulnerable-agent
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4011:4011"
    environment:
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      BEDROCK_MODEL_ID: ${BEDROCK_MODEL_ID:-anthropic.claude-3-haiku-20240307-v1:0}
      AGENT_NAME: unprotected-fleet-analyzer
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4011/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── NeMo Guardrails Agent — SAFE (Rails ON) ──────────────────────────────────
  nemo-agent:
    build:
      context: ./demo/nemo-agent
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4012:4012"
    environment:
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      BEDROCK_MODEL_ID: ${BEDROCK_MODEL_ID:-anthropic.claude-3-haiku-20240307-v1:0}
      AGENT_NAME: lytx-driver-safety-intelligence
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4012/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Route Optimizer — VULNERABLE (No Guardrails, injection surface) ──────────
  route-optimizer:
    build:
      context: ./demo/route-optimizer
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4013:4013"
    environment:
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      BEDROCK_MODEL_ID: ${BEDROCK_MODEL_ID:-anthropic.claude-3-haiku-20240307-v1:0}
      AGENT_NAME: route-optimizer-pro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4013/health"]
      interval: 10s
      timeout: 5s
      retries: 5
