# NeMo Guardrails config — provider-agnostic template
#
# This file is NOT loaded directly at runtime.
# agent.py builds the config dynamically via RailsConfig.from_content()
# using the NEMO_PROVIDER and NEMO_MODEL environment variables.
#
# Provider examples (set via env vars):
#
#   Bedrock (default):
#     NEMO_PROVIDER=bedrock
#     NEMO_MODEL=anthropic.claude-3-haiku-20240307-v1:0
#     → litellm model: bedrock/anthropic.claude-3-haiku-20240307-v1:0
#
#   OpenAI:
#     NEMO_PROVIDER=openai
#     OPENAI_API_KEY=sk-...
#     NEMO_MODEL=gpt-4o-mini
#     → litellm model: gpt-4o-mini
#
#   Anthropic:
#     NEMO_PROVIDER=anthropic
#     ANTHROPIC_API_KEY=sk-ant-...
#     NEMO_MODEL=claude-3-haiku-20240307
#     → litellm model: anthropic/claude-3-haiku-20240307
#
#   Ollama (local):
#     NEMO_PROVIDER=ollama
#     OLLAMA_BASE_URL=http://localhost:11434
#     NEMO_MODEL=llama3
#     → litellm model: ollama/llama3
#
# The generated config at runtime looks like this:
#
# models:
#   - type: main
#     engine: litellm
#     model: <NEMO_PROVIDER>/<NEMO_MODEL>
#
# rails:
#   input:
#     flows:
#       - check jailbreak
#       - check system prompt extraction
#       - check off topic
#   output:
#     flows:
#       - check no confidential data
#       - check no harmful content
