<svg viewBox="0 0 720 440" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#16a34a"/>
    </marker>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="720" height="440" fill="#f8fafc" rx="10"/>

  <!-- title -->
  <rect x="10" y="10" width="700" height="36" rx="6" fill="#1e293b"/>
  <text x="360" y="33" text-anchor="middle" fill="white" font-size="14" font-weight="bold">AI Watchtower — Securing Lytx Fleet AI</text>

  <!-- ── Row 1: Lytx agents ── -->
  <text x="360" y="68" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="bold">LYTX AI AGENTS</text>

  <rect x="10"  y="74" width="152" height="40" rx="6" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/>
  <text x="86"  y="98" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="bold">Route Optimizer</text>

  <rect x="174" y="74" width="152" height="40" rx="6" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/>
  <text x="250" y="98" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="bold">Driver Coach</text>

  <rect x="338" y="74" width="152" height="40" rx="6" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/>
  <text x="414" y="98" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="bold">Safety Monitor</text>

  <rect x="502" y="74" width="208" height="40" rx="6" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/>
  <text x="606" y="98" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="bold">Fleet Analytics</text>

  <!-- agents → gate (converging lines) -->
  <line x1="86"  y1="114" x2="86"  y2="134" stroke="#64748b" stroke-width="1.2"/>
  <line x1="250" y1="114" x2="250" y2="134" stroke="#64748b" stroke-width="1.2"/>
  <line x1="414" y1="114" x2="414" y2="134" stroke="#64748b" stroke-width="1.2"/>
  <line x1="606" y1="114" x2="606" y2="134" stroke="#64748b" stroke-width="1.2"/>
  <line x1="86"  y1="134" x2="606" y2="134" stroke="#64748b" stroke-width="1.2"/>
  <line x1="360" y1="134" x2="360" y2="152" stroke="#64748b" stroke-width="1.2" marker-end="url(#a)"/>
  <text x="395" y="146" fill="#64748b" font-size="9">register agent</text>

  <!-- ── Pre-deployment gate ── -->
  <rect x="140" y="152" width="440" height="64" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="360" y="175" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Pre-Deployment Gate</text>
  <text x="360" y="193" text-anchor="middle" fill="#93c5fd" font-size="10">46 adversarial probes · 9 OWASP LLM categories · weighted risk score</text>
  <text x="360" y="208" text-anchor="middle" fill="#64748b" font-size="9">Injection · Jailbreak · PII · SysPrompt · Excessive Agency · MCP Poisoning · Output · Misinformation</text>

  <!-- gate → pass -->
  <line x1="220" y1="216" x2="160" y2="248" stroke="#16a34a" stroke-width="2" marker-end="url(#ag)"/>
  <text x="162" y="238" fill="#16a34a" font-size="10" font-weight="bold">PASS</text>

  <!-- gate → fail -->
  <line x1="500" y1="216" x2="560" y2="248" stroke="#dc2626" stroke-width="2" marker-end="url(#ar)"/>
  <text x="527" y="238" fill="#dc2626" font-size="10" font-weight="bold">FAIL</text>

  <!-- ── PASS branch ── -->
  <rect x="10" y="248" width="290" height="52" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="155" y="269" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">✓ Agent Approved</text>
  <text x="155" y="287" text-anchor="middle" fill="#86efac" font-size="10">Goes to production · runtime monitoring active</text>
  <text x="155" y="300" text-anchor="middle" fill="#86efac" font-size="9">Re-scanned automatically on every new version</text>

  <!-- approved → runtime -->
  <line x1="155" y1="300" x2="155" y2="318" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ag)"/>

  <rect x="10" y="318" width="290" height="52" rx="8" fill="#312e81" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="155" y="339" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="bold">Runtime Monitoring</text>
  <text x="155" y="357" text-anchor="middle" fill="#a78bfa" font-size="10">NeMo Guardrails · Bedrock Guardrails</text>
  <text x="155" y="370" text-anchor="middle" fill="#a78bfa" font-size="9">LLM Guard · LlamaFirewall · any source</text>

  <!-- runtime → dashboard -->
  <line x1="155" y1="370" x2="155" y2="388" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ── FAIL branch ── -->
  <rect x="420" y="248" width="290" height="52" rx="8" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="565" y="269" text-anchor="middle" fill="#f87171" font-size="12" font-weight="bold">✗ Agent Blocked</text>
  <text x="565" y="287" text-anchor="middle" fill="#fca5a5" font-size="10">Team alerted · per-probe evidence report</text>
  <text x="565" y="300" text-anchor="middle" fill="#fca5a5" font-size="9">Suggested remediation code · fix and re-register</text>

  <!-- fail → fix loop -->
  <line x1="565" y1="300" x2="565" y2="328" stroke="#ef4444" stroke-width="1.2"/>
  <line x1="565" y1="328" x2="700" y2="328" stroke="#ef4444" stroke-width="1.2"/>
  <line x1="700" y1="328" x2="700" y2="184" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="5,3"/>
  <line x1="700" y1="184" x2="582" y2="184" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#ar)"/>
  <text x="716" y="260" fill="#94a3b8" font-size="9" transform="rotate(90,716,260)">Fix &amp; re-register</text>

  <!-- ── Bottom dashboard ── -->
  <rect x="310" y="318" width="400" height="86" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="510" y="340" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Security Dashboard + Galactus AI</text>

  <rect x="320" y="350" width="115" height="44" rx="5" fill="#0f172a"/>
  <text x="378" y="368" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="bold">Fleet Risk Score</text>
  <text x="378" y="382" text-anchor="middle" fill="#64748b" font-size="8">all teams · trends</text>
  <text x="378" y="393" text-anchor="middle" fill="#64748b" font-size="8">OWASP heatmap</text>

  <rect x="445" y="350" width="115" height="44" rx="5" fill="#0f172a"/>
  <text x="503" y="368" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="bold">Live Event Feed</text>
  <text x="503" y="382" text-anchor="middle" fill="#64748b" font-size="8">injection attempts</text>
  <text x="503" y="393" text-anchor="middle" fill="#64748b" font-size="8">blocked in real time</text>

  <rect x="570" y="350" width="130" height="44" rx="5" fill="#0f172a"/>
  <text x="635" y="368" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="bold">Galactus AI Analyst</text>
  <text x="635" y="382" text-anchor="middle" fill="#64748b" font-size="8">Claude via Bedrock</text>
  <text x="635" y="393" text-anchor="middle" fill="#64748b" font-size="8">plain-English briefings</text>

  <!-- runtime events line to dashboard -->
  <line x1="310" y1="360" x2="300" y2="360" stroke="#7c3aed" stroke-width="1.2"/>
  <line x1="300" y1="344" x2="300" y2="375" stroke="#7c3aed" stroke-width="1.2"/>

</svg>
