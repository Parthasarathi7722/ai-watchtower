<svg viewBox="0 0 920 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
    <marker id="arr-b" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arr-r" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="920" height="500" fill="#0f172a" rx="14"/>

  <!-- Title -->
  <rect x="20" y="14" width="880" height="42" rx="8" fill="#1e3a5f"/>
  <text x="460" y="41" text-anchor="middle" fill="white" font-size="16" font-weight="700" letter-spacing="0.5">AI Watchtower — Securing Lytx Fleet AI</text>

  <!-- ── LYTX AGENTS (top row) ─────────────────────────────────────────── -->
  <text x="460" y="82" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600" letter-spacing="1.5">LYTX AI AGENTS</text>

  <!-- Agent 1: Route Optimizer -->
  <rect x="36" y="90" width="148" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="110" y="113" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Route Optimizer</text>
  <text x="110" y="131" text-anchor="middle" fill="#64748b" font-size="10">Fleet dispatch &amp; routing</text>

  <!-- Agent 2: Driver Coach -->
  <rect x="202" y="90" width="148" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="276" y="113" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Driver Coach</text>
  <text x="276" y="131" text-anchor="middle" fill="#64748b" font-size="10">Behavior &amp; scoring AI</text>

  <!-- Agent 3: Safety Monitor -->
  <rect x="368" y="90" width="148" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="442" y="113" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Safety Monitor</text>
  <text x="442" y="131" text-anchor="middle" fill="#64748b" font-size="10">Event detection &amp; alerts</text>

  <!-- Agent 4: Fleet Analytics -->
  <rect x="534" y="90" width="148" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="608" y="113" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Fleet Analytics</text>
  <text x="608" y="131" text-anchor="middle" fill="#64748b" font-size="10">Reports &amp; insights</text>

  <!-- Agent 5: Dispatch Assistant -->
  <rect x="700" y="90" width="184" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="792" y="113" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Dispatch Assistant</text>
  <text x="792" y="131" text-anchor="middle" fill="#64748b" font-size="10">Scheduling &amp; comms</text>

  <!-- Arrows from agents into Watchtower -->
  <line x1="110" y1="146" x2="110" y2="172" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <line x1="276" y1="146" x2="276" y2="172" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <line x1="442" y1="146" x2="442" y2="172" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <line x1="608" y1="146" x2="608" y2="172" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <line x1="792" y1="146" x2="792" y2="172" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-b)"/>

  <!-- horizontal connector line -->
  <line x1="110" y1="172" x2="792" y2="172" stroke="#3b82f6" stroke-width="1.5"/>

  <!-- Vertical drop to Watchtower -->
  <line x1="460" y1="172" x2="460" y2="188" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr-b)"/>
  <text x="300" y="170" fill="#3b82f6" font-size="9" font-weight="600">register agent + endpoint URL</text>

  <!-- ── WATCHTOWER CORE ──────────────────────────────────────────────── -->
  <rect x="20" y="188" width="880" height="164" rx="10" fill="#111827" stroke="#1d4ed8" stroke-width="1.5"/>
  <rect x="20" y="188" width="880" height="30" rx="10" fill="#1d4ed8"/>
  <!-- fix bottom corners of header -->
  <rect x="20" y="204" width="880" height="14" fill="#1d4ed8"/>
  <text x="460" y="208" text-anchor="middle" fill="white" font-size="13" font-weight="700" letter-spacing="0.5">AI WATCHTOWER</text>

  <!-- Left panel: Pre-deployment Gate -->
  <rect x="32" y="228" width="390" height="112" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="52" y="248" fill="#93c5fd" font-size="10" font-weight="700" letter-spacing="1">PRE-DEPLOYMENT GATE</text>

  <!-- Probe categories -->
  <rect x="44" y="256" width="72" height="18" rx="4" fill="#dc2626"/>
  <text x="80" y="269" text-anchor="middle" fill="white" font-size="9">Injection LLM01</text>

  <rect x="122" y="256" width="68" height="18" rx="4" fill="#ea580c"/>
  <text x="156" y="269" text-anchor="middle" fill="white" font-size="9">Jailbreak LLM06</text>

  <rect x="196" y="256" width="52" height="18" rx="4" fill="#ca8a04"/>
  <text x="222" y="269" text-anchor="middle" fill="white" font-size="9">PII LLM02</text>

  <rect x="254" y="256" width="76" height="18" rx="4" fill="#15803d"/>
  <text x="292" y="269" text-anchor="middle" fill="white" font-size="9">SysPrompt LLM07</text>

  <rect x="336" y="256" width="60" height="18" rx="4" fill="#6d28d9"/>
  <text x="366" y="269" text-anchor="middle" fill="white" font-size="9">Agency LLM08</text>

  <rect x="44" y="280" width="52" height="18" rx="4" fill="#0e7490"/>
  <text x="70" y="293" text-anchor="middle" fill="white" font-size="9">MCP LLM03</text>

  <rect x="102" y="280" width="60" height="18" rx="4" fill="#0369a1"/>
  <text x="132" y="293" text-anchor="middle" fill="white" font-size="9">Output LLM05</text>

  <rect x="168" y="280" width="240" height="18" rx="4" fill="#1e293b"/>
  <text x="288" y="293" text-anchor="middle" fill="#94a3b8" font-size="9">46 probes · weighted risk score · ~15 sec</text>

  <!-- Gate result labels -->
  <rect x="44" y="308" width="88" height="22" rx="5" fill="#15803d"/>
  <text x="88" y="323" text-anchor="middle" fill="white" font-size="10" font-weight="700">✓ APPROVED</text>

  <rect x="142" y="308" width="82" height="22" rx="5" fill="#dc2626"/>
  <text x="183" y="323" text-anchor="middle" fill="white" font-size="10" font-weight="700">✗ BLOCKED</text>

  <text x="238" y="322" fill="#64748b" font-size="9">→ alert + per-probe evidence + fix hints</text>

  <!-- Divider -->
  <line x1="432" y1="230" x2="432" y2="338" stroke="#1e293b" stroke-width="2"/>

  <!-- Right panel: Runtime Monitoring + Galactus -->
  <rect x="442" y="228" width="448" height="112" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="462" y="248" fill="#a78bfa" font-size="10" font-weight="700" letter-spacing="1">RUNTIME MONITORING + GALACTUS</text>

  <!-- Guardrail sources -->
  <rect x="454" y="256" width="130" height="18" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="519" y="269" text-anchor="middle" fill="#e2e8f0" font-size="9">Bedrock Guardrails</text>

  <rect x="594" y="256" width="110" height="18" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="649" y="269" text-anchor="middle" fill="#e2e8f0" font-size="9">NeMo Guardrails</text>

  <rect x="714" y="256" width="80" height="18" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="754" y="269" text-anchor="middle" fill="#e2e8f0" font-size="9">LLM Guard</text>

  <text x="462" y="296" fill="#64748b" font-size="9">Every blocked event forwarded in real time → unified dashboard</text>
  <text x="462" y="311" fill="#64748b" font-size="9">No agent code changes needed · any guardrail · any language</text>

  <!-- Galactus -->
  <rect x="454" y="308" width="424" height="22" rx="5" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="480" y="323" fill="#93c5fd" font-size="9" font-weight="700">GALACTUS</text>
  <text x="540" y="323" fill="#64748b" font-size="9">— Claude-powered analyst: "Which agent is highest risk right now?"</text>

  <!-- ── OUTPUTS (bottom row) ──────────────────────────────────────────── -->

  <!-- Arrow from gate to approved -->
  <line x1="186" y1="352" x2="140" y2="378" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <!-- Arrow from gate to blocked -->
  <line x1="270" y1="352" x2="320" y2="378" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-r)"/>

  <!-- Arrow from runtime to dashboard -->
  <line x1="666" y1="352" x2="666" y2="378" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Approved box -->
  <rect x="20" y="378" width="220" height="102" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="130" y="400" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="700">Agent Approved</text>
  <text x="130" y="418" text-anchor="middle" fill="#86efac" font-size="10">Goes to production</text>
  <text x="130" y="436" text-anchor="middle" fill="#86efac" font-size="10">Runtime monitoring active</text>
  <text x="130" y="454" text-anchor="middle" fill="#86efac" font-size="10">Events flow to dashboard</text>
  <text x="130" y="468" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="600">Scan runs on every new version</text>

  <!-- Blocked box -->
  <rect x="254" y="378" width="228" height="102" rx="8" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="368" y="400" text-anchor="middle" fill="#f87171" font-size="12" font-weight="700">Agent Blocked</text>
  <text x="368" y="418" text-anchor="middle" fill="#fca5a5" font-size="10">Team alerted immediately</text>
  <text x="368" y="436" text-anchor="middle" fill="#fca5a5" font-size="10">Per-probe failure evidence</text>
  <text x="368" y="454" text-anchor="middle" fill="#fca5a5" font-size="10">Suggested remediation code</text>
  <text x="368" y="468" text-anchor="middle" fill="#f87171" font-size="9" font-weight="600">Fix → re-register → re-scan</text>

  <!-- Dashboard box -->
  <rect x="496" y="378" width="404" height="102" rx="8" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="698" y="400" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="700">Cross-Team Security Dashboard</text>

  <!-- Dashboard columns -->
  <text x="556" y="424" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">Fleet Risk Score</text>
  <text x="556" y="440" text-anchor="middle" fill="#7c6fbc" font-size="9">All teams · all agents</text>
  <text x="556" y="454" text-anchor="middle" fill="#7c6fbc" font-size="9">Trend over time</text>

  <line x1="620" y1="415" x2="620" y2="475" stroke="#312e81" stroke-width="1"/>

  <text x="665" y="424" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">Live Event Feed</text>
  <text x="665" y="440" text-anchor="middle" fill="#7c6fbc" font-size="9">Injection attempts</text>
  <text x="665" y="454" text-anchor="middle" fill="#7c6fbc" font-size="9">Blocked at runtime</text>

  <line x1="710" y1="415" x2="710" y2="475" stroke="#312e81" stroke-width="1"/>

  <text x="779" y="424" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">Galactus AI Briefings</text>
  <text x="779" y="440" text-anchor="middle" fill="#7c6fbc" font-size="9">Plain-English summaries</text>
  <text x="779" y="454" text-anchor="middle" fill="#7c6fbc" font-size="9">Q&amp;A across fleet</text>

  <text x="698" y="472" text-anchor="middle" fill="#4c1d95" font-size="9">Grafana fleet view · Slack alerts · OWASP heatmap</text>

</svg>
